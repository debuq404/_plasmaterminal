<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bash: file not found</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000b00;
            --fg: #00ff00;
            --shadow: rgba(0, 255, 0, 0.45);
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--fg);
            font-family: 'VT323', monospace;
            font-size: 24px;
            line-height: 1.2;
        }
        /* --- CRT Effects (Old Background) --- */
        body::before {
            content: " ";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            background: linear-gradient(rgba(18, 16, 16, 0) 40%, rgba(0, 0, 0, 0.26) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.015), rgba(0, 0, 255, 0.02));
            background-size: 100% 4px, 6px 100%;
        }
        body::after {
            content: " ";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 101;
            background:
                radial-gradient(ellipse at center, rgba(0,255,0,0.05) 0%, rgba(0,255,0,0) 46%),
                radial-gradient(circle, rgba(0,0,0,0) 58%, rgba(0,0,0,0.62) 100%);
        }
        .wallpaper {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background:
                radial-gradient(1200px 700px at 30% 30%, rgba(0,255,0,0.06), rgba(0,0,0,0) 60%),
                radial-gradient(900px 600px at 70% 70%, rgba(0,255,0,0.04), rgba(0,0,0,0) 55%),
                linear-gradient(180deg, rgba(0,255,0,0.02), rgba(0,0,0,0) 40%),
                repeating-linear-gradient(90deg, rgba(0,255,0,0.035), rgba(0,255,0,0.035) 1px, rgba(0,0,0,0) 1px, rgba(0,0,0,0) 64px);
            mix-blend-mode: screen;
            opacity: 0.75;
        }
        /* --- TTY Content --- */
        .tty {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 2;
            text-shadow: 0 0 10px var(--fg);
        }
        .tty p {
            margin: 0;
        }
        .cursor {
            display: inline-block;
            width: 12px;
            height: 24px;
            background: var(--fg);
            margin-left: 4px;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            box-shadow: 0 0 10px var(--fg);
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="wallpaper"></div>
    
    <div class="tty">
        <p>bash: <span id="path"></span>: No such file or directory</p>
        <p>Error code: ENOENT</p>
        <p>System halted. Press ENTER to return to desktop.</p>
        <p>user@plasmadesk:~$ <span class="cursor"></span></p>
    </div>

    <script>
        const fanSound = new Audio("fan.mp3");
        fanSound.loop = true;
        fanSound.volume = 0.26;

        const clickSound = new Audio("click.mp3");
        const keySound = new Audio("key.mp3"); // Using key sound for Enter

        let soundInitialized = false;

        function initSound() {
            if (soundInitialized) return;
            fanSound.play().catch(() => {});
            soundInitialized = true;
        }

        // Initialize sound on first interaction
        window.addEventListener("pointerdown", initSound, { once: true });
        window.addEventListener("keydown", initSound, { once: true });
        
        // Mouse click sound
        document.addEventListener("mousedown", () => {
            clickSound.currentTime = 0;
            clickSound.play();
        });

        // Set the path in the error message
        document.getElementById('path').textContent = window.location.pathname;

        // Handle ENTER key to redirect
        document.addEventListener("keydown", (e) => {
            if (e.code === "Enter" || e.key === "Enter") {
                keySound.currentTime = 0;
                keySound.play();
                // Add a very small delay for the sound to start
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 100);
            }
        });
    </script>
</body>
</html>

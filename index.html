<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>plasmadesk</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000b00;
            --fg: #00ff00;
            --fg-dim: rgba(0, 255, 0, 0.75);
            --panel: rgba(0, 18, 0, 0.86);
            --panel2: rgba(0, 12, 0, 0.92);
            --line: rgba(0, 255, 0, 0.7);
            --shadow: rgba(0, 255, 0, 0.45);
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--fg);
            font-family: 'VT323', monospace;
            font-size: 22px;
        }
        body::before {
            content: " ";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 250;
            background: linear-gradient(rgba(18, 16, 16, 0) 40%, rgba(0, 0, 0, 0.26) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.015), rgba(0, 0, 255, 0.02));
            background-size: 100% 4px, 6px 100%;
        }
        body::after {
            content: " ";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 251;
            background:
                radial-gradient(ellipse at center, rgba(0,255,0,0.05) 0%, rgba(0,255,0,0) 46%),
                radial-gradient(circle, rgba(0,0,0,0) 58%, rgba(0,0,0,0.62) 100%);
        }
        .wallpaper {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background:
                radial-gradient(1200px 700px at 30% 30%, rgba(0,255,0,0.06), rgba(0,0,0,0) 60%),
                radial-gradient(900px 600px at 70% 70%, rgba(0,255,0,0.04), rgba(0,0,0,0) 55%),
                linear-gradient(180deg, rgba(0,255,0,0.02), rgba(0,0,0,0) 40%),
                repeating-linear-gradient(90deg, rgba(0,255,0,0.035), rgba(0,255,0,0.035) 1px, rgba(0,0,0,0) 1px, rgba(0,0,0,0) 64px);
            mix-blend-mode: screen;
            opacity: 0.75;
        }
        .desktop {
            position: fixed;
            inset: 0 0 42px 0;
            padding: 20px;
            box-sizing: border-box;
            z-index: 2;
            overflow: hidden;
        }
        .icon {
            width: 110px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            text-shadow: 0 0 12px var(--fg);
            transition: transform 80ms linear;
            position: absolute;
        }
        .icon:active { transform: none; }
        .icon:hover .icon-glyph,
        .icon:hover .icon-label {
            outline: 1px solid rgba(0,255,0,0.75);
            box-shadow: 0 0 16px rgba(0,255,0,0.18);
        }
        .icon.selected .icon-glyph,
        .icon.selected .icon-label {
            outline: 1px solid rgba(0,255,0,0.95);
            background: rgba(0,255,0,0.12);
            box-shadow: 0 0 20px rgba(0,255,0,0.3);
        }
        .icon-label {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 8px;
            margin-top: 2px;
        }
        .icon-glyph {
            width: 70px;
            height: 54px;
            margin: 0 auto 8px auto;
            border: 1px solid var(--fg);
            box-shadow: 0 0 16px var(--shadow);
            position: relative;
            background: rgba(0, 255, 0, 0.06);
            border-radius: 8px;
            overflow: hidden;
        }
        .icon.folder .icon-glyph::before {
            content: " ";
            position: absolute;
            left: 10px;
            top: 8px;
            width: 28px;
            height: 10px;
            border: 1px solid var(--fg);
            border-bottom: none;
            background: rgba(0, 255, 0, 0.10);
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
        }
        .icon.folder .icon-glyph::after {
            content: " ";
            position: absolute;
            left: 7px;
            right: 7px;
            top: 18px;
            bottom: 8px;
            border: 1px solid rgba(0,255,0,0.85);
            background: linear-gradient(180deg, rgba(0,255,0,0.14), rgba(0,255,0,0.04));
            border-radius: 7px;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.35);
        }
        .icon.desktop-file .icon-glyph::before {
            content: " ";
            position: absolute;
            left: 10px;
            top: 8px;
            width: 28px;
            height: 10px;
            border: 1px solid var(--fg);
            border-bottom: none;
            background: rgba(0, 255, 0, 0.10);
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
        }
        .icon.desktop-file .icon-glyph::after {
            content: "TXT";
            position: absolute;
            left: 7px;
            right: 7px;
            top: 18px;
            bottom: 8px;
            border: 1px solid rgba(0,255,0,0.85);
            background: linear-gradient(180deg, rgba(0,255,0,0.14), rgba(0,255,0,0.04));
            border-radius: 7px;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: var(--fg);
        }
        .icon.game .icon-glyph {
            background: rgba(0, 255, 0, 0.06);
        }
        .icon.game .icon-glyph::before {
            content: " ";
            position: absolute;
            left: 8px;
            top: 8px;
            width: 40px;
            height: 26px;
            background: linear-gradient(transparent 45%, var(--fg) 45%, var(--fg) 55%, transparent 55%);
            clip-path: polygon(0 60%, 12% 60%, 12% 28%, 28% 28%, 28% 0, 72% 0, 72% 28%, 88% 28%, 88% 60%, 100% 60%, 100% 78%, 78% 78%, 78% 100%, 22% 100%, 22% 78%, 0 78%);
        }

        /* Стили для новой иконки mrse (знак вопроса) */
        .icon.mrse .icon-glyph::after {
            content: "?";
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', cursive;
            font-size: 28px;
            color: var(--fg);
            text-shadow: 0 0 10px var(--fg);
        }

        .taskbar {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: 42px;
            border-top: 1px solid var(--line);
            background: rgba(0, 20, 0, 0.92);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            z-index: 20;
        }
        .start-btn {
            margin-left: 10px;
            height: 30px;
            min-width: 86px;
            border: 1px solid var(--fg);
            background: rgba(0,255,0,0.10);
            color: var(--fg);
            font: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 10px;
            text-shadow: 0 0 10px var(--fg);
            border-radius: 8px;
        }
        .start-logo {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--fg);
            box-shadow: 0 0 8px var(--fg);
        }
        .start-menu {
            position: fixed;
            left: 10px;
            bottom: 44px;
            width: 210px;
            border: 1px solid var(--line);
            background: rgba(0, 16, 0, 0.96);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.35);
            display: none;
            z-index: 30;
            border-radius: 10px;
            overflow: hidden;
        }
        .start-menu.open { display: block; }
        .start-menu button {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(0,255,0,0.22);
            color: var(--fg);
            font: inherit;
            padding: 10px;
            text-align: left;
            text-shadow: 0 0 8px var(--fg);
        }
        .window {
            position: fixed;
            top: 90px;
            left: 120px;
            width: min(760px, calc(100vw - 40px));
            background: rgba(0, 12, 0, 0.90);
            border: 1px solid rgba(0,255,0,0.75);
            box-shadow: 0 0 26px rgba(0,255,0,0.35);
            display: none;
            z-index: 25;
            border-radius: 10px;
            overflow: hidden;
        }
        .window.visible { display: block; }
        .window-title {
            border-bottom: 1px solid var(--line);
            padding: 6px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--fg);
            color: var(--bg);
            text-shadow: none;
            font-weight: bold;
        }
        .window-body {
            background: rgba(0, 14, 0, 0.88);
        }
        .close-btn {
            border: 1px solid var(--bg);
            background: rgba(0, 0, 0, 0.08);
            color: var(--bg);
            font: inherit;
            padding: 0 8px;
        }
        .window-body {
            padding: 12px;
            min-height: 190px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
            gap: 12px;
        }
        .mini-icon {
            width: 92px;
            text-align: center;
            user-select: none;
            cursor: default;
            transition: transform 80ms linear;
        }
        .mini-icon:hover .mini-glyph,
        .mini-icon:hover .mini-label {
            outline: 1px solid rgba(0,255,0,0.75);
            box-shadow: 0 0 16px rgba(0,255,0,0.18);
        }
        .mini-icon:active { transform: none; }
        .mini-label {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 8px;
            margin-top: 2px;
        }
        .mini-glyph {
            width: 50px;
            height: 38px;
            margin: 0 auto 6px auto;
            border: 1px solid var(--fg);
            background: rgba(0,255,0,0.07);
            box-shadow: 0 0 14px var(--shadow);
            position: relative;
            border-radius: 8px;
        }
        .mini-icon.folder .mini-glyph::before {
            content: " ";
            position: absolute;
            left: 5px;
            top: -7px;
            width: 20px;
            height: 7px;
            border: 1px solid var(--fg);
            border-bottom: none;
            background: rgba(0, 255, 0, 0.12);
        }
        .mini-icon.file .mini-glyph::before {
            content: "TXT";
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .mini-icon.game .mini-glyph::before {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            width: 4px;
            height: 4px;
            background: var(--fg);
            transform: translate(-50%, -50%);
            box-shadow:
                -16px -8px var(--fg), -12px -8px var(--fg), -8px -8px var(--fg), -4px -8px var(--fg), 4px -8px var(--fg), 8px -8px var(--fg), 12px -8px var(--fg), 16px -8px var(--fg),
                -16px -4px var(--fg), -8px -4px var(--fg), -4px -4px var(--fg), 0 -4px var(--fg), 4px -4px var(--fg), 8px -4px var(--fg), 16px -4px var(--fg),
                -16px 0 var(--fg), -12px 0 var(--fg), -8px 0 var(--fg), -4px 0 var(--fg), 0 0 var(--fg), 4px 0 var(--fg), 8px 0 var(--fg), 12px 0 var(--fg), 16px 0 var(--fg),
                -12px 4px var(--fg), -8px 4px var(--fg), 8px 4px var(--fg), 12px 4px var(--fg),
                -8px 8px var(--fg), -4px 8px var(--fg), 4px 8px var(--fg), 8px 8px var(--fg);
        }
        .auth-modal {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            border: 1px solid rgba(0,255,0,0.75);
            background: rgba(0, 12, 0, 0.96);
            box-shadow: 0 0 24px rgba(0,255,0,0.35);
            display: none;
            z-index: 40;
            border-radius: 10px;
            overflow: hidden;
        }
        .auth-modal.visible { display: block; }
        .auth-head {
            border-bottom: 1px solid var(--line);
            padding: 8px 10px;
            background: var(--fg);
            color: var(--bg);
            font-weight: bold;
        }
        .auth-body {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .auth-body input {
            background: #001600;
            border: 1px solid var(--line);
            color: var(--fg);
            font-family: 'Press Start 2P', 'VT323', monospace;
            font-size: 12px;
            padding: 6px;
            outline: none;
            letter-spacing: 2px;
        }
        .auth-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        .auth-actions button {
            border: 1px solid var(--line);
            background: transparent;
            color: var(--fg);
            font: inherit;
            padding: 4px 10px;
        }
        .status {
            min-height: 20px;
            color: #00ffff;
        }
        .poweroff {
            position: fixed;
            inset: 0;
            background: #000;
            opacity: 0;
            pointer-events: none;
            z-index: 90;
        }
        .poweroff.on {
            opacity: 1;
            pointer-events: auto;
        }

        /* Сцена после выключения: тишина → remember.ogg → he.png (глаз) → текст, боковые ed/ev + глитч */
        #shutdownTheater {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: #000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2.5vh 4vw 3vh;
            box-sizing: border-box;
            pointer-events: none;
            gap: 2vh;
        }
        #shutdownTheater.on {
            display: flex;
        }
        .shutdown-portraits-row {
            display: flex;
            flex-direction: row;
            align-items: flex-end;
            justify-content: center;
            gap: clamp(6px, 1.8vw, 22px);
            width: 100%;
            max-width: 980px;
            flex-shrink: 0;
        }
        .shutdown-pwrap {
            position: relative;
            flex: 1 1 0;
            min-width: 0;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }
        .shutdown-pwrap .shutdown-pimg {
            max-height: min(38vh, 340px);
            max-width: 100%;
        }
        #shutdownHe.shutdown-pimg {
            flex: 0 0 auto;
            max-height: min(46vh, 400px);
            max-width: min(42vw, 420px);
        }
        .shutdown-pimg {
            display: block;
            width: auto;
            height: auto;
            object-fit: contain;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            opacity: 0;
            transition: opacity 2.9s ease-out;
        }
        .shutdown-pimg.reveal {
            opacity: 1;
        }
        #shutdownHe.fadeout {
            opacity: 0 !important;
            transition: opacity 4.2s ease-in;
        }
        .shutdown-glitch-layer {
            position: absolute;
            left: 0;
            top: 0;
            right: 0;
            bottom: 0;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }
        .shutdown-glitch-canvas {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #shutdownCaption {
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(7px, 1.25vw, 10px);
            color: rgba(218, 228, 220, 0.94);
            max-width: min(96vw, 720px);
            width: 100%;
            margin: 0;
            text-align: center;
            line-height: 1.75;
            text-shadow: 0 0 20px rgba(60, 90, 75, 0.5);
            opacity: 0;
            transition: opacity 0.95s ease;
            white-space: pre-wrap;
            -webkit-font-smoothing: none;
            font-smooth: never;
        }
        #shutdownCaption.show {
            opacity: 1;
        }
        #shutdownCaption.slow-fadeout {
            transition: opacity 6s ease-out !important;
            opacity: 0 !important;
        }
        .selection-box {
            position: absolute;
            border: 1px dashed rgba(0,255,0,0.95);
            background: rgba(0,255,0,0.10);
            pointer-events: none;
            display: none;
            z-index: 10;
        }
        .about-modal {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 420px;
            border: 1px solid var(--line);
            background: rgba(0, 12, 0, 0.97);
            box-shadow: 0 0 28px rgba(0,255,0,0.35);
            display: none;
            z-index: 35;
            border-radius: 10px;
            overflow: hidden;
        }
        .about-modal.visible { display: block; }
        .about-title-bar {
            background: var(--fg);
            color: var(--bg);
            padding: 6px 10px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .about-body {
            padding: 20px 24px 24px 24px;
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        .about-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            min-width: 80px;
        }
        .about-logo-circle {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: radial-gradient(circle at 38% 38%, rgba(0,255,0,0.5), rgba(0,255,0,0.05));
            border: 2px solid var(--fg);
            box-shadow: 0 0 18px rgba(0,255,0,0.5), inset 0 0 12px rgba(0,255,0,0.15);
        }
        .about-logo-text {
            font-size: 14px;
            text-shadow: 0 0 8px var(--fg);
            letter-spacing: 1px;
        }
        .about-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .about-row {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }
        .about-key {
            color: rgba(0,255,0,0.55);
            font-size: 17px;
        }
        .about-val {
            text-shadow: 0 0 8px var(--fg);
            font-size: 20px;
        }
        .about-divider {
            height: 1px;
            background: rgba(0,255,0,0.25);
            margin: 8px 0 4px 0;
        }
        .about-copy {
            color: rgba(0,255,0,0.6);
            font-size: 17px;
        }

        /* ── BOOT OVERLAY ─────────────────────────────────── */
        #bootOverlay {
            position: fixed; inset: 0; background: #000; z-index: 500;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 28px;
            cursor: pointer; user-select: none;
            font-family: 'Press Start 2P', monospace;
            color: var(--fg); text-align: center;
        }
        /* scanlines — same technique as desktop body::before */
        #bootOverlay::before {
            content: " "; position: absolute; inset: 0; pointer-events: none; z-index: 1;
            background: linear-gradient(rgba(18,16,16,0) 40%, rgba(0,0,0,0.26) 50%),
                        linear-gradient(90deg, rgba(255,0,0,0.02), rgba(0,255,0,0.015), rgba(0,0,255,0.02));
            background-size: 100% 4px, 6px 100%;
        }
        /* vignette — same technique as desktop body::after */
        #bootOverlay::after {
            content: " "; position: absolute; inset: 0; pointer-events: none; z-index: 1;
            background: radial-gradient(ellipse at center, rgba(0,255,0,0.05) 0%, rgba(0,255,0,0) 46%),
                        radial-gradient(circle, rgba(0,0,0,0) 58%, rgba(0,0,0,0.62) 100%);
        }
        #bootOverlay.booting { cursor: default; pointer-events: none; }
        #bootOverlay.gone    { display: none; }

        #bootMainText {
            font-size: clamp(10px, 2vw, 16px);
            text-shadow: 0 0 18px var(--fg);
            line-height: 2;
            position: relative; z-index: 2;
        }
        #bootMainText.welcome-mode {
            font-size: clamp(18px, 4vw, 36px);
            color: #fff;
            text-shadow: 0 0 30px var(--fg), 0 0 70px var(--fg), 0 0 120px rgba(0,255,0,0.4);
        }

        /* ─────────────────────────────────────────────────── */
    </style>
</head>
<body>
        <div id="bootOverlay">
        <div id="bootMainText">CLICK TO BOOT</div>
    </div>
    <div class="wallpaper"></div>
    <div id="desktop" class="desktop">
        <div class="icon folder" data-open-folder="693">

            <div class="icon-label">693</div>

        <div class="icon desktop-file" data-file-url="404.html" id="desktopFile3">

        <div class="icon mrse" id="mrseIcon" style="right: 30px; bottom: 30px;" data-file-url="signal.html">

        <div id="selectionBox" class="selection-box"></div>

    <div id="fileWindow" class="window">
        <div class="window-title">
            <span id="windowTitle">/home/user</span>
            <button id="closeWindow" class="close-btn">X</button>
        </div>
        <div id="windowBody" class="window-body"></div>
    </div>

    <div id="authModal" class="auth-modal">
        <div class="auth-head">encrypted file</div>
        <div class="auth-body">
            <div id="authTarget">enter password</div>
            <input id="authInput" type="text" autocomplete="new-password" autocapitalize="off" autocorrect="off" spellcheck="false" name="plasma_auth_key" />
            <div id="authStatus" class="status"></div>
            <div class="auth-actions">

    <div class="taskbar" id="taskbar">
        <button id="startBtn" class="start-btn"><span class="start-logo"></span>Пуск</button>

    <div id="startMenu" class="start-menu">
        <button id="aboutBtn">О системе</button>
        <button id="rebootBtn">Перезагрузить</button>
        <button id="shutdownBtn">Выключить</button>
    </div>

    <div id="aboutModal" class="about-modal">

        function paintShutdownGlitchScribbles(layer) {
            const wrap = layer.parentElement;
            if (!wrap) return;
            const canvas = ensureShutdownGlitchCanvas(layer);
            const w = wrap.clientWidth;
            const h = wrap.clientHeight;
            if (w < 3 || h < 3) return;
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            canvas.width = Math.floor(w * dpr);
            canvas.height = Math.floor(h * dpr);
            canvas.style.width = `${w}px`;
            canvas.style.height = `${h}px`;
            const ctx = canvas.getContext("2d");
            ctx.imageSmoothingEnabled = false;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.clearRect(0, 0, w, h);
            const band = h * 0.48;
            ctx.strokeStyle = "#ffffff";
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.globalAlpha = 1;

            function scribblePoly(x0, y0, steps, spreadX, spreadY, lw) {
                ctx.lineWidth = lw;
                ctx.beginPath();
                let x = x0;
                let y = y0;
                ctx.moveTo(x, y);
                for (let i = 0; i < steps; i++) {
                    x += (Math.random() - 0.5) * spreadX;
                    y += (Math.random() - 0.45) * spreadY;
                    if (y > band) y = band - Math.random() * 3;
                    if (y < 0) y = Math.random() * 4;
                    x = Math.max(-1, Math.min(w + 1, x));
                    ctx.lineTo(x, y);
                }
                ctx.stroke();
            }

            const loose = 52 + Math.floor(Math.random() * 40);
            for (let n = 0; n < loose; n++) {
                scribblePoly(
                    Math.random() * w,
                    Math.random() * band,
                    5 + Math.floor(Math.random() * 14),
                    26,
                    20,
                    0.65 + Math.random() * 2.4
                );
            }

            const faceW = w * 0.62;
            const faceX = (w - faceW) * 0.5;
            const faceBand = band * 0.92;
            const tight = 38 + Math.floor(Math.random() * 28);
            for (let n = 0; n < tight; n++) {
                scribblePoly(
                    faceX + Math.random() * faceW,
                    Math.random() * faceBand,
                    6 + Math.floor(Math.random() * 18),
                    20,
                    16,
                    0.55 + Math.random() * 1.9
                );
            }

            ctx.globalAlpha = 0.88;
            ctx.lineWidth = 1;
            for (let n = 0; n < 22; n++) {
                ctx.beginPath();
                const x0 = faceX + Math.random() * faceW;
                const y0 = Math.random() * faceBand * 0.95;
                ctx.moveTo(x0, y0);
                const loops = 8 + Math.floor(Math.random() * 10);
                let a = Math.random() * Math.PI * 2;
                let x = x0;
                let y = y0;
                for (let i = 0; i < loops; i++) {
                    a += (Math.random() - 0.4) * 1.1;
                    x += Math.cos(a) * (2.5 + Math.random() * 5);
                    y += Math.sin(a) * (2.2 + Math.random() * 4.5);
                    if (y > band) y = band - 1;
                    ctx.lineTo(x, y);
                }
                ctx.stroke();
            }
        }

        function updateBoxSelection(e) {
            if (!isBoxSelecting) return;
            const rect = desktop.getBoundingClientRect();
            const x1 = Math.min(boxStartX, e.clientX) - rect.left;
            const y1 = Math.min(boxStartY, e.clientY) - rect.top;
            const x2 = Math.max(boxStartX, e.clientX) - rect.left;
            const y2 = Math.max(boxStartY, e.clientY) - rect.top;
            selectionBox.style.left = `${x1}px`;
            selectionBox.style.top = `${y1}px`;
            selectionBox.style.width = `${x2 - x1}px`;
            selectionBox.style.height = `${y2 - y1}px`;
            desktopIcons.forEach((icon) => {
                const r = icon.getBoundingClientRect();
                const overlap = !(r.right < rect.left + x1 || r.left > rect.left + x2 || r.bottom < rect.top + y1 || r.top > rect.top + y2);
                if (overlap) icon.classList.add("selected");
                else if (!e.ctrlKey) icon.classList.remove("selected");
            });
        }

        function stopBoxSelection() {

            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);

                accessSound.currentTime = 0;
                accessSound.play();
                authStatus.style.color = "#00ff00";
                authStatus.textContent = "access granted";
                authRedirectTimer = setTimeout(() => {
                    authModal.classList.remove("visible");
                    window.location.href = `${fileData.fileHash}.html`;
                }, 1000);
            } else {
                errorSound.currentTime = 0;
                errorSound.play();
                authStatus.style.color = "#ff0000";
                authStatus.textContent = "access denied";
            }
        }

        desktopIcons.forEach((icon) => {
            if (icon.dataset.openFolder) {
                wireOpenOnDoubleClick(icon, () => openFolder(icon.dataset.openFolder));
            } else if (icon.dataset.fileUrl) {
                wireOpenOnDoubleClick(icon, () => {
                    window.location.href = icon.dataset.fileUrl;
                });
            }
            icon.addEventListener("mousedown", (e) => {
                if (e.button !== 0) return;
                e.stopPropagation();
                selectIcon(icon, e.ctrlKey);
                startIconDrag(e, icon);
            });
        });

        desktop.addEventListener("mousedown", (e) => {
            if (e.button !== 0) return;
            startBoxSelection(e);
        });

        document.addEventListener("mousemove", (e) => {
            updateIconDrag(e);
            updateBoxSelection(e);
        });

        document.addEventListener("mouseup", () => {
            stopIconDrag();
            stopBoxSelection();
        });

        initDesktopIcons();

        closeWindow.addEventListener("click", () => fileWindow.classList.remove("visible"));

        authOpen.addEventListener("click", openEncryptedFile);
        authInput.addEventListener("keydown", (e) => {
            if (e.code === "Enter" || e.key === "Enter") {
                e.preventDefault();
                openEncryptedFile();
                return;
            }
            if (e.code === "Backspace" || e.key === "Backspace") {
                e.preventDefault();
                authRawPassword = authRawPassword.slice(0, -1);
                authInput.value = "*".repeat(authRawPassword.length);
                playKey();
                return;
            }
            if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
                e.preventDefault();
                authRawPassword += e.key;
                authInput.value = "*".repeat(authRawPassword.length);
                playKey();
            }
        });
        authInput.addEventListener("paste", (e) => {
            e.preventDefault();
            const pasted = (e.clipboardData || window.clipboardData).getData("text") || "";
            if (!pasted) return;
            authRawPassword += pasted;
            authInput.value = "*".repeat(authRawPassword.length);
            playKey();
        });
        authCancel.addEventListener("click", () => {
            authRawPassword = "";
            authInput.value = "";
            authModal.classList.remove("visible");
        });

        aboutBtn.addEventListener("click", () => {
            closeStartMenu();
            aboutModal.classList.add("visible");
        });

        aboutClose.addEventListener("click", () => {
            aboutModal.classList.remove("visible");
        });

        startBtn.addEventListener("click", () => {
            startMenu.classList.toggle("open");
        });

        rebootBtn.addEventListener("click", () => {
            closeStartMenu();
            setTimeout(() => location.reload(), 220);
        });

        shutdownBtn.addEventListener("click", () => {
            closeStartMenu();
            turnoffSound.currentTime = 0;
            turnoffSound.play();
            setTimeout(() => {
                poweroff.classList.add("on");
                desktop.style.display = "none";
                taskbarEl.style.display = "none";
                fileWindow.classList.remove("visible");
                authModal.classList.remove("visible");
                shutdownTheater.classList.add("on");
                runShutdownMonologue();
            }, 140);
        });

        document.addEventListener("click", (e) => {
            if (!startMenu.contains(e.target) && e.target !== startBtn && !startBtn.contains(e.target)) {
                closeStartMenu();
            }
        });
    </script>
</body>
</html>
